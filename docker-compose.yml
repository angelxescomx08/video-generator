services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-videogen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-videogen}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-videogen}"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer
    ports:
      - "8081:8080"
    depends_on:
      - postgres

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

  tts:
    build: ./docker/piper
    ports:
      - "5002:5000"
    volumes:
      - tts-models:/data/models

  worker:
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
      tts:
        condition: service_started
    volumes:
      - ./apps/worker:/app/apps/worker
      - render-data:/app/data/renders
    # env_file already injects real env vars into the container, so we bypass the package.json
    # "dev" script's dotenv-cli wrapper (which expects a local .env file that isn't copied here).
    command: npx tsx watch src/index.ts

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    # see the note on the worker service above re: bypassing the dotenv-cli wrapper here too.
    command: npx next dev

volumes:
  pgdata:
  ollama-data:
  tts-models:
  render-data:
